<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @keyframes ma-pulse { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.14); opacity: 0.8; } }
  input[type=range].ma-slider { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; outline: none; cursor: pointer; }
  input[type=range].ma-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.35); cursor: pointer; }
</style>
</helmet>

<div style="min-width: 100%; min-height: 100vh; box-sizing: border-box; padding: 48px 24px; background: #e7e5df; font-family: 'Fredoka', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;">
  <div style="margin-bottom: 8px; font-size: 22px; font-weight: 700; color: #2b2b30; letter-spacing: -0.3px;">Mini Arcade — Settings</div>
  <div style="margin-bottom: 36px; font-size: 14px; font-weight: 500; color: #8a8a92;">Account settings hub · reached from the Home gear · live toggles + sliders</div>

  <x-import component-from-global-scope="IOSDevice" from="./ios-frame.jsx" dark="{{ darkMode }}" hint-size="402px,874px">
    <div data-screen-label="Settings" id="v3-mount" style="position: relative; width: 100%; height: 100%; overflow-x: hidden; overflow-y: auto; background: radial-gradient(135% 90% at 50% -10%, #a435ee 0%, #6d28d9 44%, #3b0d73 100%); display: flex; flex-direction: column; box-sizing: border-box; padding: 56px 18px 28px;">
      <div style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle, rgba(216,112,255,0.4) 0%, rgba(216,112,255,0) 70%); animation: ma-pulse 6s ease-in-out infinite; pointer-events: none; z-index: 0;"></div>
      <!-- header -->
      <div style="position: relative; z-index: 1; display: flex; align-items: center; gap: 14px; margin-bottom: 26px;">
        <button style="width: 44px; height: 44px; border-radius: 14px; border: 1.5px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer;" onClick="{{ noop }}">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M12 4l-6 6 6 6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div style="font-size: 30px; font-weight: 700; color: #fff; letter-spacing: -0.6px;">Settings</div>
      </div>

      <!-- profile hero -->
      <div style="position: relative; display: flex; align-items: center; gap: 16px; padding: 18px; border-radius: 24px; background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.16); margin-bottom: 14px;">
        <div style="position: relative; width: 64px; height: 64px; flex: none;">
          <div style="width: 64px; height: 64px; border-radius: 20px; background: linear-gradient(150deg, #FFE27A, #FFB300); display: flex; align-items: center; justify-content: center; color: #3b0d73; font-size: 27px; font-weight: 700;">Y</div>
        </div>
        <div style="flex: 1;">
          <div style="font-size: 20px; font-weight: 700; color: #fff;">You</div>
          <div style="font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.55);">Guest player</div>
        </div>
        <button style="height: 38px; padding: 0 16px; border-radius: 19px; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #fff; font-family: 'Fredoka', sans-serif; font-size: 13.5px; font-weight: 600; cursor: pointer;" onClick="{{ noop }}">Edit</button>
      </div>

      <!-- premium banner (gold) -->
      <button style="display: flex; align-items: center; gap: 14px; width: 100%; padding: 16px 18px; border: none; border-radius: 24px; background: linear-gradient(150deg, #FFE27A, #FFB300); cursor: pointer; text-align: left; font-family: 'Fredoka', sans-serif; margin-bottom: 26px; box-shadow: 0 10px 24px rgba(217,140,0,0.35);" onClick="{{ noop }}">
        <div style="width: 46px; height: 46px; border-radius: 14px; background: rgba(59,13,115,0.16); display: flex; align-items: center; justify-content: center; flex: none;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#3b0d73"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4z"/></svg>
        </div>
        <div style="flex: 1;">
          <div style="font-size: 16.5px; font-weight: 700; color: #3b0d73;">Unlock Premium</div>
          <div style="font-size: 12.5px; font-weight: 600; color: rgba(59,13,115,0.7);">8 players · all games · no ads</div>
        </div>
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none"><path d="M1.5 1.5l6 6-6 6" stroke="#3b0d73" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <!-- AUDIO -->
      <div style="font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.3px; margin: 0 2px 12px;">Audio</div>
      <div style="display: flex; align-items: center; gap: 14px; margin-bottom: 16px;">
        <div style="width: 42px; height: 42px; border-radius: 13px; background: rgba(255,210,63,0.18); display: flex; align-items: center; justify-content: center; flex: none;">
          <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><path d="M11 3v16M6 7v8M16 7v8M3 9.5v3M19 9.5v3" stroke="#FFD23F" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div style="flex: 1;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;">
            <span style="font-size: 14.5px; font-weight: 600; color: #fff;">Music</span>
            <span style="font-size: 12.5px; font-weight: 600; color: #FFD23F;">{{ music }}</span>
          </div>
          <input type="range" min="0" max="100" value="{{ music }}" onInput="{{ onMusic }}" class="ma-slider" style="width: 100%; background: {{ musicTrack }};">
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 14px; margin-bottom: 16px;">
        <div style="width: 42px; height: 42px; border-radius: 13px; background: rgba(56,225,255,0.18); display: flex; align-items: center; justify-content: center; flex: none;">
          <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><path d="M4 8v6h3l5 4V4L7 8H4z" fill="#38E1FF"/><path d="M15 8.5a3.5 3.5 0 0 1 0 5" stroke="#38E1FF" stroke-width="1.8" stroke-linecap="round"/></svg>
        </div>
        <div style="flex: 1;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;">
            <span style="font-size: 14.5px; font-weight: 600; color: #fff;">Sound FX</span>
            <span style="font-size: 12.5px; font-weight: 600; color: #38E1FF;">{{ sfx }}</span>
          </div>
          <input type="range" min="0" max="100" value="{{ sfx }}" onInput="{{ onSfx }}" class="ma-slider" style="width: 100%; background: {{ sfxTrack }};">
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 14px; margin-bottom: 26px;">
        <div style="width: 42px; height: 42px; border-radius: 13px; background: rgba(182,255,75,0.16); display: flex; align-items: center; justify-content: center; flex: none;">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="6" y="2.5" width="8" height="15" rx="2.5" stroke="#B6FF4B" stroke-width="1.8"/><path d="M2 8v4M18 8v4" stroke="#B6FF4B" stroke-width="1.8" stroke-linecap="round"/></svg>
        </div>
        <span style="flex: 1; font-size: 14.5px; font-weight: 600; color: #fff;">Haptics</span>
        <button onClick="{{ toggleHaptics }}" style="position: relative; width: 50px; height: 30px; border-radius: 15px; border: none; cursor: pointer; padding: 0; transition: background 0.2s; background: {{ hapticsTrack }};">
          <span style="position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 50%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: transform 0.2s; transform: {{ hapticsKnob }};"></span>
        </button>
      </div>

      <!-- GAMEPLAY -->
      <div style="font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.3px; margin: 0 2px 12px;">Gameplay</div>
      <div style="margin-bottom: 16px;">
        <div style="font-size: 14.5px; font-weight: 600; color: #fff; margin-bottom: 10px;">Round length</div>
        <div style="display: flex; gap: 8px;">
          <button onClick="{{ setLen }}" data-len="Short" style="{{ lenStyle.Short }}">Short</button>
          <button onClick="{{ setLen }}" data-len="Medium" style="{{ lenStyle.Medium }}">Medium</button>
          <button onClick="{{ setLen }}" data-len="Long" style="{{ lenStyle.Long }}">Long</button>
        </div>
      </div>
      <button style="display: flex; align-items: center; gap: 14px; width: 100%; background: none; border: none; cursor: pointer; padding: 8px 0; font-family: 'Fredoka', sans-serif; margin-bottom: 8px;" onClick="{{ noop }}">
        <div style="width: 42px; height: 42px; border-radius: 13px; background: rgba(255,93,162,0.16); display: flex; align-items: center; justify-content: center; flex: none;">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#FF5DA2" stroke-width="1.7"/><ellipse cx="10" cy="10" rx="3.4" ry="8" stroke="#FF5DA2" stroke-width="1.7"/><line x1="2.2" y1="10" x2="17.8" y2="10" stroke="#FF5DA2" stroke-width="1.7"/></svg>
        </div>
        <span style="flex: 1; text-align: left; font-size: 14.5px; font-weight: 600; color: #fff;">Language</span>
        <span style="display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.55);">{{ language }}
          <svg width="8" height="13" viewBox="0 0 9 15" fill="none"><path d="M1.5 1.5l6 6-6 6" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </button>
      <div style="display: flex; align-items: center; gap: 14px; padding: 8px 0; margin-bottom: 26px;">
        <div style="width: 42px; height: 42px; border-radius: 13px; background: rgba(164,53,238,0.22); display: flex; align-items: center; justify-content: center; flex: none;">
          <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><path d="M11 3a5 5 0 0 0-5 5c0 4-2 5-2 5h14s-2-1-2-5a5 5 0 0 0-5-5z" stroke="#c98bff" stroke-width="1.8" stroke-linejoin="round"/><path d="M9.5 17a1.7 1.7 0 0 0 3 0" stroke="#c98bff" stroke-width="1.8" stroke-linecap="round"/></svg>
        </div>
        <span style="flex: 1; font-size: 14.5px; font-weight: 600; color: #fff;">Notifications</span>
        <button onClick="{{ toggleNotif }}" style="position: relative; width: 50px; height: 30px; border-radius: 15px; border: none; cursor: pointer; padding: 0; transition: background 0.2s; background: {{ notifTrack }};">
          <span style="position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 50%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: transform 0.2s; transform: {{ notifKnob }};"></span>
        </button>
      </div>

      <!-- footer links -->
      <div style="display: flex; gap: 10px; margin-bottom: 18px;">
        <button style="flex: 1; height: 46px; border-radius: 14px; border: 1.5px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); font-family: 'Fredoka', sans-serif; font-size: 13.5px; font-weight: 600; cursor: pointer;" onClick="{{ noop }}">Help</button>
        <button style="flex: 1; height: 46px; border-radius: 14px; border: 1.5px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); font-family: 'Fredoka', sans-serif; font-size: 13.5px; font-weight: 600; cursor: pointer;" onClick="{{ noop }}">Privacy</button>
        <button style="flex: 1; height: 46px; border-radius: 14px; border: 1.5px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); font-family: 'Fredoka', sans-serif; font-size: 13.5px; font-weight: 600; cursor: pointer;" onClick="{{ noop }}">Terms</button>
      </div>

      <button style="width: 100%; height: 52px; border: none; border-radius: 16px; background: rgba(255,93,162,0.14); color: #FF8FC0; font-family: 'Fredoka', sans-serif; font-size: 15.5px; font-weight: 700; cursor: pointer; margin-bottom: 14px;" onClick="{{ noop }}">Sign out</button>
      <div style="text-align: center; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.3);">Mini Arcade · Version 1.0.0</div>
    </div>
  </x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    music: 70,
    sfx: 85,
    haptics: true,
    notifications: true,
    gameLength: 'Medium',
    language: 'English',
  };
  set(k, v) { this.setState({ [k]: v }); }
  renderVals() {
    const s = this.state;
    const track = (pct, fill, rest) => `linear-gradient(90deg, ${fill} ${pct}%, ${rest} ${pct}%)`;
    const onClr = '#B6FF4B', offClr = 'rgba(255,255,255,0.18)';
    const lens = ['Short', 'Medium', 'Long'];
    return {
      darkMode: true,
      music: s.music, sfx: s.sfx,
      haptics: s.haptics, notifications: s.notifications,
      gameLength: s.gameLength, language: s.language,
      onMusic: (e) => this.set('music', +e.target.value),
      onSfx: (e) => this.set('sfx', +e.target.value),
      toggleHaptics: () => this.set('haptics', !s.haptics),
      toggleNotif: () => this.set('notifications', !s.notifications),
      setLen: (e) => this.set('gameLength', e.currentTarget.dataset.len),
      noop: () => {},
      lengths: lens,
      lenStyle: lens.reduce((o, l) => {
        const on = s.gameLength === l;
        o[l] = `flex: 1; height: 40px; border-radius: 12px; font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1.5px solid ${on ? '#FFD23F' : 'rgba(255,255,255,0.18)'}; background: ${on ? '#FFD23F' : 'rgba(255,255,255,0.06)'}; color: ${on ? '#3b0d73' : 'rgba(255,255,255,0.75)'};`;
        return o;
      }, {}),
      musicTrack: track(s.music, '#FFD23F', 'rgba(255,255,255,0.18)'),
      sfxTrack: track(s.sfx, '#38E1FF', 'rgba(255,255,255,0.18)'),
      hapticsTrack: s.haptics ? onClr : offClr,
      hapticsKnob: s.haptics ? 'translateX(20px)' : 'translateX(0)',
      notifTrack: s.notifications ? onClr : offClr,
      notifKnob: s.notifications ? 'translateX(20px)' : 'translateX(0)',
    };
  }
}
</script>
</body>
</html>
